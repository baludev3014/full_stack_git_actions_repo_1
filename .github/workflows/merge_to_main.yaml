name: Merging dev branch into main
on:
  pull_request:
    branches:
      - main

jobs:
  merging_dev_to_main:

    run-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Logging Git Repo
        run: echo "${{ toJSON(github) }}"
  
  status:

    runs-on: ubuntu-latest

    needs:
      - merging_dev_to_main
      
    steps:
      - name: Logging the status
        run: echo "success 👍👍👍👍."
